<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="navbar">
  <nav
          th:data-islogin="${global.isLogin}"
          class="navbar navbar-expand-md bg-color-white fixed-top"
  >
    <div class="nav-body">
      <div class="nav-logo-wrap-lg">
        <a class="navbar-logo-wrap" href="/">
          <img class="logo" src="/img/codemate-logo.svg" alt="CodeMate" th:src="@{/img/codemate-logo.svg}"/>
          <img src="/img/codemate-icon.svg" class="logo-lg" alt="CodeMate" th:src="@{/img/codemate-icon.svg}"/>
        </a>
        <div class="dropdown nav-menu-lg">
          <div class="dropdown">
            <div
                    class="nav-menu-lg-btn dropdown-toggle"
                    type="button"
                    data-toggle="dropdown"
                    aria-expanded="false"
            >
              导航
              <svg class="nav-menu-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
            <div class="dropdown-menu">
              <a class="dropdown-item" href="/">首页</a>
              <a class="dropdown-item" href="/column">教程</a>
              <a class="dropdown-item" href="/chat">CodeMate AI</a>
            </div>
          </div>
        </div>
      </div>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          <li
                  th:class="${'nav-item' + (!#strings.equals(global.currentDomain, 'column')
                    && !#strings.equals(global.currentDomain, 'follow')
                    && !#strings.equals(global.currentDomain, 'chat')? ' selected-domain' : '')}"
                  class="nav-item"
          >
            <a class="nav-link" href="/">首页</a>
          </li>
          <li
                  th:class="${'nav-item' + (#strings.equals(global.currentDomain, 'column') ? ' selected-domain' : '')}"
                  class="nav-item"
          >
            <a class="nav-link" href="/column">教程</a>
          </li>
          <li
                  th:class="${'nav-item' + (#strings.equals(global.currentDomain, 'chat') ? ' selected-domain' : '')}"
                  class="nav-item"
          >
            <a class="nav-link" href="/chat">CodeMate AI</a>
          </li>
        </ul>
      </div>
      <div class="nav-right">
        <button
                type="button"
                class="btn btn-primary nav-article"
                th:data-target="${global.isLogin ? '' : '#loginModal'}"
                th:data-toggle="${global.isLogin ? '' : 'modal'}"
        >
          写文章
        </button>
        <ul th:if="${!global.isLogin}">
          <!--  待登录 -->
          <li class="nav-item">
            <a
                    class="nav-link"
                    href="#"
                    data-toggle="modal"
                    data-target="#loginModal"
            >
              登录
            </a>
          </li>
        </ul>
        <ul th:if="${global.isLogin}" class="nav-right-user">
          <!--  已登录 -->
          <li class="nav-item nav-notice">
            <a class="nav-link navbar-count-msg-box" href="/notice/">
                <span
                        th:if="${global.msgNum != null && global.msgNum > 0}"
                        th:text="${global.msgNum}"
                        class="navbar-count-msg"
                ></span>
              <!-- 消息提醒的角标 -->
              <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="icon"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      stroke-width="2"
                      stroke="currentColor"
                      fill="none"
                      stroke-linecap="round"
                      stroke-linejoin="round"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                <path
                        d="M10 5a2 2 0 0 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3h-16a4 4 0 0 0 2 -3v-3a7 7 0 0 1 4 -6"
                ></path>
                <path d="M9 17v1a3 3 0 0 0 6 0v-1"></path>
              </svg>
            </a>
          </li>
          <!-- 头像框 -->
          <div class="nav-right-user">
            <div class="nav-user-avatar">
              <img
                      class="nav-login-img"
                      style="border-radius: 50%"
                      th:src="${global.user.photo}"
                      src="https://static.developers.pub/static/img/logo.b2ff606.jpeg"
                      alt=""
                      loading="lazy"
              />
              <div class="nav-user-arrow"></div>
              <div class="nav-user-dropdown">
                <div class="nav-user-dropdown-inner nav-user-dropdown::before">
                  <!-- 下落框内容 -->
                  <!--  调整为所有用户都可以直接看到管理后台  th:if="${#strings.equalsIgnoreCase(global.user.role, 'admin')}"-->
                  <!-- 本地环境的时候不显示，本地环境的时候通过后端直接启动管理后台 -->
                  <a
                          th:if="${#strings.equals(global.env, 'prod')}"
                          href="/admin/#/statistics/index"
                          target="_blank"
                          class="dropdown-item"
                  >
                    管理后台
                  </a>
                  <div
                          th:if="${#strings.equalsIgnoreCase(global.user.role, 'admin')}"
                          class="dropdown-divider"
                  ></div>
                  <a
                          th:href="${'/user/home?userId=' + (global.user?.userId ?: '')}"
                          class="dropdown-item"
                          href="#"
                  >
                    个人主页
                  </a>
                  <a id="logoutBtn" href="/logout" class="dropdown-item">登出</a>
                </div>
              </div>
            </div>
          </div>
        </ul>
      </div>
    </div>
  </nav>
  <style>
  </style>


  <!-- 登录 Modal -->
  <div
          th:if="${!global.isLogin}"
          class="modal fade"
          id="loginModal"
          data-backdrop="static"
          data-keyboard="false"
          tabindex="-1"
          role="dialog"
          aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title">登录 CodeMate 畅享更多权益</h6>
          <button
                  type="button"
                  class="close"
                  data-dismiss="modal"
                  aria-label="Close"
          >
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="auth-body">
            <div class="login-main">
              <!-- 分为上下两部分，下面是其他登录比如说 GitHub、验证码 -->
              <div class="panel">
                <h1 class="title">用户名密码登录</h1>
                <!-- 登录表单、用户名和密码 -->
                <form id="login-form">
                  <div class="form-group">
                    <input type="text" required autocomplete="off" class="form-control form-control-sm" id="username" placeholder="输入用户名">
                  </div>
                  <div class="form-group">
                    <input type="password" required class="form-control form-control-sm" id="password" placeholder="输入密码">
                  </div>
                  <button type="submit" class="btn btn-primary btn-block btn-sm">登录</button>
                </form>
              </div>
              <div class="other-login-box">
                <a class="clickable" data-toggle="modal" data-target="#registerModal" data-dismiss="modal">还没有账号？立即注册</a>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <div class="agreement-box">
            <div class="mdnice-user-dialog-footer">
              <p>登录即同意
                <a href="article/detail/141"
                   target="_blank" rel="noopener noreferrer">
                  用户协议
                </a> 和
                <a href="article/detail/142"
                   target="_blank" rel="noopener noreferrer">
                  隐私政策
                </a>
              </p>
            </div>
          </div>
          <div class="mock-login" th:if="${!#strings.equals(global.env, 'prod')}">
            <!-- 非生产环境，使用模拟登陆  -->
            <button
                    id="mockLogin2"
                    type="button"
                    th:data-verify-code="''"
                    class="btn btn-sm btn-light"
            >
              随机新用户
            </button>

            <button
                    id="mockLogin"
                    type="button"
                    th:data-verify-code="''"
                    class="btn btn-sm btn-dark"
            >
              一键登录
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="registerModal" tabindex="-1" role="dialog" aria-labelledby="registerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title">创建 CodeMate 账号</h6>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="auth-body">
            <div class="register-main">
              <div class="panel">
                <h1 class="title">使用用户名和密码创建账号</h1>
                <form id="register-form">
                  <div class="form-group row">
                    <label class="col-sm-3 col-form-label col-form-label-sm pr-0" for="registerUser">用户名</label>
                    <div class="col-sm-9">
                      <input type="text"
                             placeholder="用户名密码方式登录时用"
                             class="form-control"
                             id="registerUser" required>
                    </div>
                  </div>
                  <div class="form-group row">
                    <label class="col-sm-3 col-form-label col-form-label-sm pr-0" for="registerPassword">密码</label>
                    <div class="col-sm-9">
                      <input type="password" placeholder="至少 8 位，包含至少三类字符" class="form-control" id="registerPassword" required>
                      <small class="form-text text-muted">需包含大写字母、小写字母、数字、特殊字符中的至少三类，且不能有空格。</small>
                    </div>
                  </div>
                  <button type="submit"
                          class="btn btn-primary btn-block btn-sm">注册并登录</button>
                </form>
              </div>
              <div class="other-login-box">
                <a class="clickable" data-toggle="modal" data-target="#loginModal" data-dismiss="modal">
                  返回登录
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/sockjs.min.js" th:src="${global.siteInfo.oss + '/js/sockjs.min.js'}"></script>
  <script src="/js/stomp.min.js" th:src="${global.siteInfo.oss + '/js/stomp.min.js'}"></script>
  <script
          src="/js/mock.js"
          th:if="${!#strings.equals(global.env, 'prod')}"
  ></script>

  <script th:inline="javascript">
    // 登录
    $("#login-form").on("submit", function(event) {
      event.preventDefault();

      // 获取用户名和密码，没有定义 ID
      const username = $("#username").val();
      const password = $("#password").val();

      $.ajax({
        url: "/login/username",
        type: "POST",
        data: {
          username: username,
          password: password
        },
        success: function(response) {
          console.log(response);
          if(response.status.code === 0) {
            // 登录成功
            refreshPage();
          } else {
            // 登录失败
            toastr.error(response.status.msg);
          }
        },
        error: function(error) {
          console.error(error);
          // 出现错误时如何处理
        }
      });
    });

    // 注册
    $("#register-form").on("submit", function(event) {
      console.log("注册账号");
      event.preventDefault();

      // 获取用户名和密码，没有定义 ID
      const registerUser = $('#registerUser').val();
      const password = $("#registerPassword").val();
      const categoryCount = [/[A-Z]/, /[a-z]/, /\d/, /[^A-Za-z0-9\s]/]
              .filter(pattern => pattern.test(password)).length;
      if (password.length < 8 || password.length > 64 || /\s/.test(password) || categoryCount < 3) {
        toastr.error("密码需为 8-64 位、无空格，且包含至少三类字符（大写、小写、数字、特殊字符）");
        return;
      }

      $.ajax({
        url: "/login/register",
        type: "POST",
        data: {
          username: registerUser,
          password: password,
          invitationCode: ''
        },
        success: function(response) {
          console.log(response);
          if(response.status.code === 0) {
            // 注册成功，跳转到个人详情页面
            toastr.success("注册成功！正在跳转到个人详情页面...");
            setTimeout(function() {
              window.location.href = "/user/home?userId=" + response.result;
            }, 1500);
          } else {
            // 注册失败
            toastr.error(response.status.msg);
          }
        },
        error: function(error) {
          console.error(error);
          // 出现错误时如何处理
        }
      });
    });


    $(".nav-article").click(() => {
      if ([[${global.isLogin}]]) {
        // 新页面打开文章编辑
        // 移除本地缓存
        localStorage.removeItem('articleTitle');
        window.open("/article/edit")
      }
    })

    // 定义一个刷新页面的方法
    function refreshPage() {
      if (window.location.pathname === "/login") {
        // 登录成功，跳转首页
        window.location.href = "/";
      } else {
        // 刷新当前页面
        window.location.reload();
      }
    }

    // 获取用户头像和下落框元素
    const navUserAvatar = document.querySelector('.nav-user-avatar');
    const navUserDropdown = document.querySelector('.nav-user-dropdown');

    if (navUserAvatar != null && navUserDropdown != null) {
      // 当鼠标点击用户头像时显示下落框
      navUserAvatar.addEventListener('click', () => {
        // 如果下落框是隐藏的，则显示；如果已经显示，则不处理
        if (navUserDropdown.style.display === 'none' || navUserDropdown.style.display === '') {
          navUserDropdown.style.display = 'block';
        }
      });
      // 点击其他区域时隐藏下落框
      document.addEventListener('click', (event) => {
        // 如果点击的区域不是用户头像和下落框，则隐藏下落框
        if (!navUserAvatar.contains(event.target) && !navUserDropdown.contains(event.target)) {
          navUserDropdown.style.display = 'none';
        }
      });
    }

    // --------------- 下面进入全局消息通知的入口 --------------
    function now() {
      return new Date().getTime()
    }

    // 用于全局消息通知的长连接
    let userWsSocket = null;
    let userWsClient = null;
    let userWsAckTime = 0;

    function autoBuildNotifyWsConnect() {
      const logined = [[${global.isLogin}]]
      if (!logined) {
        // 未登录
        return;
      }

      const session = getCookie("f-session");
      if (session) {
        console.log("登录成功，准备建立连接!!!");

        let protocol = window.location.protocol.replace("http", "ws");
        let host = window.location.host;

        userWsSocket = new WebSocket(`${protocol}//${host}/notify`);
        userWsClient = Stomp.over(userWsSocket);

        userWsClient.connect({"uname": $("#uname").val()}, function (frame) {
          console.log('Connected: ' + frame);
          userWsAckTime = now();
          userWsClient.subscribe(`/user/msg`, function (message) {
            // 订阅用户的私人broker，用于接收系统私发消息； 后台通过向 /user/xxx/topic/notify 发送消息，来传递给某个私人用户
            console.log("系统消息: ", message);
            userWsAckTime = now();

            if (message.body != 'pong') {
              // 解析 JSON 格式的消息
              let type = 'comment'; // 默认类型
              let messageText = message.body;
              try {
                const msgObj = JSON.parse(message.body);
                if (msgObj.type && msgObj.message) {
                  type = msgObj.type;
                  messageText = msgObj.message;
                }
              } catch (e) {
                // 如果不是 JSON 格式，保持原有逻辑（兼容旧消息）
                console.log("非 JSON 格式的消息:", message.body);
              }
              let html = `<div>${messageText}</div><div><a href="/notice/${type}" target="_blank" style="color:blue"> 查看详情 </a></div>`
              toastr.success(html);
            }
          });

          userWsClient.subscribe(`/msg`, function (message) {
            // 订阅全局的消息
            console.log("系统消息: ", message);
            userWsAckTime = now();
            if (message.body != 'pong') {
              toastr.success(message.body);
            }
          });

        }, {id: session});
      }
    }

    function notifyWsCheck() {
      // 长连接的校验
      let nowTime = now();
      if (nowTime - userWsAckTime > 90_000) {
        console.log('未接收到返回消息，重新建立长连接!');
        autoBuildNotifyWsConnect();
      } else {
        userWsClient.send(`/app/msg/health`, {}, "ping");
      }
    }

    if ([[${global.isLogin}]]) {
      // 30s一次的ping/pong，用于长连接的保活
      notifyWsCheck();
      setInterval(notifyWsCheck, 30_000)
    }

  </script>
</div>
</html>
