name: Build and Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate deployment shell script
        run: bash -n deploy.sh

      - name: Validate production Compose configuration
        run: |
          cp deploy/.env.production.example deploy/.env
          docker compose --env-file deploy/.env -f deploy/docker-compose.prod.yml config --quiet

  agent-workbench-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend E2E dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test Agent workbench interactions
        run: npm run test:e2e

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: pai_coding
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        env:
          DB_USERNAME: root
          DB_PASSWORD: root
          JWT_SECRET: ci-only-secret-must-not-be-used-in-production-2026
        run: mvn --batch-mode --no-transfer-progress test
