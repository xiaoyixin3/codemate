name: Publish Container Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag
        required: true
        default: latest
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build production JAR
        run: mvn --batch-mode --no-transfer-progress -pl codemate-web -am package -DskipTests -Pprod

      - name: Prepare container context
        run: |
          mkdir -p release
          cp codemate-web/target/codemate-web-0.0.1-SNAPSHOT.jar release/codemate.jar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.prebuilt
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
