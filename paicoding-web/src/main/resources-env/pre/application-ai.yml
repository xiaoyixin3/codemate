net:
  proxy:
    - ip: 127.0.0.1
      port: 1080
      type: SOCKS

chatgpt:
  main: CHAT_GPT_3_5
  conf:
    CHAT_GPT_3_5:
      keys:
        - ${OPENAI_API_KEY:}
      proxy: true
      apiHost: https://api.openai.com/
      timeOut: 900
      maxToken: 1000
    CHAT_GPT_4:
      keys:
        - ${OPENAI_GPT4_API_KEY:}
      proxy: true
      apiHost: https://api.openai.com/
      timeOut: 900
      maxToken: 1000
  number:
    normal: 50
    vip: 100

xunfei:
  hostUrl: http://spark-api.xf-yun.com/v1.1/chat
  appId: ${XUNFEI_APP_ID:}
  apiKey: ${XUNFEI_API_KEY:}
  apiSecret: ${XUNFEI_API_SECRET:}

deepseek:
  apiHost: https://api.deepseek.com
  apiKey: ${DEEPSEEK_API_KEY:}
  timeout: 900

doubao:
  api-key: ${DOUBAO_API_KEY:}
  api-host: https://ark.cn-beijing.volces.com/api/v3
  end-point: ${DOUBAO_ENDPOINT:}

codemate:
  langchain4j:
    enabled: ${LANGCHAIN4J_ENABLED:true}
    fallback-enabled: ${LANGCHAIN4J_FALLBACK_ENABLED:true}
    provider: ${AGENT_MODEL_PROVIDER:deepseek}
    base-url: ${DEEPSEEK_API_HOST:https://api.deepseek.com/v1}
    api-key: ${DEEPSEEK_API_KEY:}
    chat-model: ${DEEPSEEK_MODEL:deepseek-chat}
    context-window-tokens: ${DEEPSEEK_CONTEXT_WINDOW_TOKENS:64000}
    open-ai-base-url: ${OPENAI_COMPATIBLE_BASE_URL:https://api.openai.com/v1}
    open-ai-api-key: ${OPENAI_COMPATIBLE_API_KEY:}
    open-ai-chat-model: ${OPENAI_COMPATIBLE_MODEL:gpt-4o-mini}
    open-ai-context-window-tokens: ${OPENAI_COMPATIBLE_CONTEXT_WINDOW_TOKENS:128000}
    temperature: ${AGENT_TEMPERATURE:0.2}
    timeout-seconds: ${AGENT_TIMEOUT_SECONDS:120}
    first-token-timeout-seconds: ${AGENT_FIRST_TOKEN_TIMEOUT_SECONDS:20}
    total-response-timeout-seconds: ${AGENT_TOTAL_RESPONSE_TIMEOUT_SECONDS:120}
    memory-max-messages: ${AGENT_MEMORY_MAX_MESSAGES:20}
    memory-summary-max-chars: ${AGENT_MEMORY_SUMMARY_MAX_CHARS:4000}
    memory-preference-max-items: ${AGENT_MEMORY_PREFERENCE_MAX_ITEMS:20}
    max-tool-round-trips: ${AGENT_MAX_TOOL_ROUND_TRIPS:3}
    tool-timeout-millis: ${AGENT_TOOL_TIMEOUT_MILLIS:3000}
    tool-max-output-chars: ${AGENT_TOOL_MAX_OUTPUT_CHARS:12000}
    tool-max-keyword-length: ${AGENT_TOOL_MAX_KEYWORD_LENGTH:80}
    tool-max-article-content-chars: ${AGENT_TOOL_MAX_ARTICLE_CONTENT_CHARS:6000}
    max-run-tool-calls: ${AGENT_MAX_RUN_TOOL_CALLS:8}
    max-run-execution-seconds: ${AGENT_MAX_RUN_EXECUTION_SECONDS:180}
    max-run-token-budget: ${AGENT_MAX_RUN_TOKEN_BUDGET:16000}
    run-sweeper-delay-millis: ${AGENT_RUN_SWEEPER_DELAY_MILLIS:10000}
    log-requests: ${AGENT_LOG_REQUESTS:false}
    log-responses: ${AGENT_LOG_RESPONSES:false}
  rag:
    enabled: ${RAG_ENABLED:false}
    api-host: ${EMBEDDING_API_HOST:https://api.openai.com/v1}
    api-key: ${EMBEDDING_API_KEY:}
    embedding-model: ${EMBEDDING_MODEL:text-embedding-3-small}
    chunk-size: 1000
    chunk-overlap: 150
    top-k: 5
    max-candidate-chunks: 2000
    min-score: 0.45
    timeout-seconds: 60
    index-version: ${RAG_INDEX_VERSION:v2-hybrid}
    keyword-candidate-chunks: ${RAG_KEYWORD_CANDIDATES:200}
    vector-candidate-chunks: ${RAG_VECTOR_CANDIDATES:1000}
    vector-weight: ${RAG_VECTOR_WEIGHT:0.65}
    keyword-weight: ${RAG_KEYWORD_WEIGHT:0.25}
    freshness-weight: ${RAG_FRESHNESS_WEIGHT:0.10}
    debug-max-results: 20
  evaluation:
    fixed-random-seed: ${AGENT_EVAL_RANDOM_SEED:20260722}
    external-model-enabled: ${AGENT_EVAL_EXTERNAL_MODEL_ENABLED:false}
